<!doctype html>
<html lang="en-US" dir="ltr" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <title>%VITE_APP_TITLE%</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-title" content="Adventure" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body>
    <header>
      <h1>%VITE_APP_TITLE%</h1>
    </header>

    <main>
      <canvas id="canvas" class="canvas" width="320" height="192"></canvas>
    </main>

    <footer>
      <span>"1" &mdash; Reset</span>
      <span>"2" &mdash; Select</span>
      <span>Arrow Keys &mdash; Move</span>
      <span>Space &mdash; Drop Item</span>
      <div class="footer-break"></div>
      <button
        id="btn-left-difficulty"
        title="Dragon attack speed — B: slower (Amateur), A: faster (Pro)"
      >
        Left: B
      </button>
      <button
        id="btn-right-difficulty"
        title="Dragon behavior — B: flees the sword, A: ignores the sword"
      >
        Right: B
      </button>
      <button id="btn-fullscreen">Full Screen</button>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
